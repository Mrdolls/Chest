<script>
    // --- CONNEXION BACKEND ---
    const API_URL = "http://localhost:5000/api";
    let currentUserId = "123456789"; // ID de test par défaut

    async function fetchUserData(userId) {
        try {
            const response = await fetch(`${API_URL}/profile/${userId}`);
            const result = await response.json();
            if (result.status === "success") {
                const data = result.data;
                document.getElementById('lunar-keys-count').innerText = data.lunar_keys || 0;
                document.getElementById('eclats-count').innerText = data.eclats || 0;
            }
        } catch (error) {
            console.error("Erreur lors de la récupération des données:", error);
        }
    }

    // Charger les données au démarrage
    window.addEventListener('DOMContentLoaded', () => {
        // 1. Vérifier si l'ID est dans l'URL (retour de callback)
        const urlParams = new URLSearchParams(window.location.search);
        let userId = urlParams.get('user_id');

        // 2. Si non, vérifier dans le localStorage
        if (!userId) {
            userId = localStorage.getItem('discord_user_id');
        }

        // 3. Si on a toujours rien, redirection vers login.html
        if (!userId) {
            window.location.href = 'login.html';
            return;
        }

        // 4. On sauvegarde l'ID pour la prochaine fois et on nettoie l'URL
        localStorage.setItem('discord_user_id', userId);
        if (urlParams.has('user_id')) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        currentUserId = userId;
        fetchUserData(currentUserId);
    });
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
    import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';
    import TWEEN from '@tweenjs/tween.js';

    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    // ── 1. SCÈNE & CAMÉRA ────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000812);

    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 0.5, 2.5);

    // ── AUDIO ───────────────────────────────────────────────────────────
    const listener = new THREE.AudioListener();
    camera.add(listener);
    const soundFall = new THREE.Audio(listener);
    const audioLoader = new THREE.AudioLoader();
    audioLoader.load('sounds/chest_fall.mp3', (buffer) => {
        soundFall.setBuffer(buffer);
        soundFall.setVolume(0.5);
    });

    const soundOpen = new THREE.Audio(listener);
    audioLoader.load('sounds/openning.mp3', (buffer) => {
        soundOpen.setBuffer(buffer);
        soundOpen.setVolume(isMulti ? 0.2 : 0.6);
    });

    const soundLoop = new THREE.Audio(listener);
    audioLoader.load('sounds/loop_open.mp3', (buffer) => {
        soundLoop.setBuffer(buffer);
        soundLoop.setLoop(true);
        soundLoop.setVolume(isMulti ? 0.4 : 0.05);
    });

    const soundTake = new THREE.Audio(listener);
    audioLoader.load('sounds/take.mp3', (buffer) => {
        soundTake.setBuffer(buffer);
        soundTake.setVolume(0.2);
    });

    const rarityBuffers = {};
    const loadRarity = (id, file) => {
        audioLoader.load(`sounds/${file}`, (buf) => { rarityBuffers[id] = buf; });
    };
    loadRarity('commun', 'commun.mp3');
    loadRarity('rare', 'rare.mp3');
    loadRarity('mythique', 'mythic.mp3');
    loadRarity('legendaire', 'legendary.mp3');
    loadRarity('secret', 'secret.mp3');
    loadRarity('lunair', 'lunar.mp3');

    const renderer = new THREE.WebGLRenderer({
        antialias: false,
        powerPreference: "high-performance",
        precision: isMobile ? 'lowp' : 'mediump' // Basse précision pour mobile
    });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(isMobile ? 1.0 : Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ── 2. CONTRÔLES ────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2;
    controls.minDistance = 1;
    controls.maxDistance = 8;
    controls.target.set(0, -0.4, 0);

    // ── 3. SYSTÈME DE PAILLETTES 3D (Émetteur continu) ──────────────────
    class MagicSparkles {
        constructor(scene, pos, rarity) {
            const countFactor = isMobile ? 1.5 : 4.0;
            this.count = Math.floor(rarity.mult * countFactor);
            const size = isMobile ? 0.012 : 0.015;
            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshStandardMaterial({
                color: rarity.color,
                metalness: 0.2,
                roughness: 0.5,
                emissive: rarity.color,
                emissiveIntensity: 0.3,
                transparent: true
            });

            this.mesh = new THREE.InstancedMesh(geo, mat, this.count);
            scene.add(this.mesh);

            this.dummy = new THREE.Object3D();
            this.particles = [];
            this.pos = pos;
            this.isStopping = false;
            this.speedMult = rarity.mult / 10; // Commun=1.0, Lunair=3.5

            for (let i = 0; i < this.count; i++) {
                this.particles.push(this.createParticle(true));
            }
            this.isDead = false;
        }

        createParticle(randomStartLife = false) {
            const s = this.speedMult;
            return {
                pos: this.pos.clone().add(new THREE.Vector3(
                    (Math.random() - 0.5) * 0.18,
                    0.25,
                    (Math.random() - 0.5) * 0.18
                )),
                vel: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.00005 * s,
                    (Math.random() * 0.002 + 0.0001) * s,
                    (Math.random() - 0.5) * 0.00005 * s
                ),
                rot: new THREE.Euler(Math.random(), Math.random(), Math.random()),
                rotVel: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.04,
                    (Math.random() - 0.5) * 0.04,
                    (Math.random() - 0.5) * 0.04
                ),
                life: randomStartLife ? Math.random() : 1.0
            };
        }

        update(delta) {
            if (this.isDead) return;

            let aliveCount = 0;
            for (let i = 0; i < this.count; i++) {
                const p = this.particles[i];
                p.life -= delta * 0.4 * this.speedMult; // Disparition proportionnelle à la vitesse

                if (p.life <= 0) {
                    if (this.isStopping) {
                        p.pos.y = -100;
                    } else {
                        this.particles[i] = this.createParticle();
                    }
                } else {
                    aliveCount++;
                    p.pos.add(p.vel);
                    p.rot.x += p.rotVel.x;
                    p.rot.y += p.rotVel.y;
                    p.rot.z += p.rotVel.z;
                }

                this.dummy.position.copy(p.pos);
                this.dummy.rotation.copy(p.rot);
                const s = Math.min(p.life * 4, 1.0);
                this.dummy.scale.set(s, s, s);
                this.dummy.updateMatrix();
                this.mesh.setMatrixAt(i, this.dummy.matrix);
            }
            this.mesh.instanceMatrix.needsUpdate = true;

            if (this.isStopping && aliveCount === 0) {
                this.isDead = true;
                scene.remove(this.mesh);
                this.mesh.geometry.dispose();
                this.mesh.material.dispose();
            }
        }

        stop() {
            this.isStopping = true;
        }
    }

    class MagicBurst {
        constructor(scene, pos, rarity) {
            this.count = isMobile ? 80 : 160;
            const size = isMobile ? 0.01 : 0.015;
            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshStandardMaterial({
                color: rarity.color,
                metalness: 0.9,
                roughness: 0.1,
                emissive: rarity.color,
                emissiveIntensity: 0.8,
                transparent: true
            });

            this.mesh = new THREE.InstancedMesh(geo, mat, this.count);
            scene.add(this.mesh);

            this.dummy = new THREE.Object3D();
            this.particles = [];
            for (let i = 0; i < this.count; i++) {
                const angle1 = Math.random() * Math.PI * 2;
                const angle2 = Math.random() * Math.PI * 0.5; // Uniquement vers le haut
                const speed = 0.008 + Math.random() * 0.0005;

                this.particles.push({
                    pos: pos.clone().add(new THREE.Vector3(0, 0.3, 0)),
                    vel: new THREE.Vector3(
                        Math.cos(angle1) * Math.sin(angle2) * speed,
                        Math.cos(angle2) * speed,
                        Math.sin(angle1) * Math.sin(angle2) * speed
                    ),
                    rot: new THREE.Euler(Math.random(), Math.random(), Math.random()),
                    rotVel: new THREE.Vector3(Math.random()*0.03, Math.random()*0.03, Math.random()*0.03),
                    life: 2.0 // Vie plus longue car c'est plus lent
                });
            }
            this.isDead = false;
        }

        update(delta) {
            if (this.isDead) return;
            let alive = 0;
            for (let i = 0; i < this.count; i++) {
                const p = this.particles[i];
                p.life -= delta * 1.5;
                if (p.life > 0) {
                    alive++;
                    p.pos.add(p.vel);
                    p.vel.y -= 0; // Légère gravité pour le réalisme
                    p.rot.x += p.rotVel.x;
                    p.rot.y += p.rotVel.y;
                    p.rot.z += p.rotVel.z;

                    this.dummy.position.copy(p.pos);
                    this.dummy.rotation.copy(p.rot);
                    const s = p.life;
                    this.dummy.scale.set(s, s, s);
                    this.dummy.updateMatrix();
                    this.mesh.setMatrixAt(i, this.dummy.matrix);
                } else {
                    this.dummy.scale.set(0,0,0);
                    this.dummy.updateMatrix();
                    this.mesh.setMatrixAt(i, this.dummy.matrix);
                }
            }
            this.mesh.instanceMatrix.needsUpdate = true;
            if (alive === 0) {
                this.isDead = true;
                scene.remove(this.mesh);
                this.mesh.geometry.dispose();
                this.mesh.material.dispose();
            }
        }
    }
    let activeSparkles = [];

    class GodPackAmbientParticles {
        constructor(scene, pos) {
            this.scene = scene;
            this.count = 5;
            this.geo = new THREE.BufferGeometry();
            this.verts = new Float32Array(this.count * 3);
            this.vels = [];
            for (let i = 0; i < this.count; i++) {
                // Position initiale au centre (avec un petit offset aléatoire)
                this.verts[i*3] = 0;
                this.verts[i*3+1] = 0.1;
                this.verts[i*3+2] = 0;
                // Vitesse vers le haut et l'extérieur
                this.vels.push({
                    x: (Math.random() - 0.5) * 0.01,
                    y: Math.random() * 0.00015 + 0.0000005,
                    z: (Math.random() - 0.5) * 0.01
                });
            }
            this.geo.setAttribute('position', new THREE.BufferAttribute(this.verts, 3));
            this.mat = new THREE.PointsMaterial({
                color: 0xFFFF00,
                size: 0.05,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            this.points = new THREE.Points(this.geo, this.mat);
            this.points.position.copy(pos);
            scene.add(this.points);
            this.alive = true;
        }
        update() {
            if (!this.alive) return;

            // Effet de scintillement (Twinkle)
            this.mat.opacity = 0.6 + Math.sin(Date.now() * 0.01) * 0.4;

            const positions = this.points.geometry.attributes.position.array;
            for (let i = 0; i < this.count; i++) {
                positions[i*3] += this.vels[i].x;
                positions[i*3+1] += this.vels[i].y;
                positions[i*3+2] += this.vels[i].z;

                // Si la particule monte trop haut ou s'éloigne trop, on la reset au centre
                if (positions[i*3+1] > 1.2 || Math.abs(positions[i*3]) > 0.8) {
                    positions[i*3] = (Math.random() - 0.5) * 0.1;
                    positions[i*3+1] = 0.1;
                    positions[i*3+2] = (Math.random() - 0.5) * 0.1;
                }
            }
            this.points.geometry.attributes.position.needsUpdate = true;
        }
        destroy() {
            this.alive = false;
            this.scene.remove(this.points);
            this.points.geometry.dispose();
            this.points.material.dispose();
        }
    }
    let godPackAmbient = [];

    // Les lumières magiques seront désormais créées individuellement pour chaque coffre
    // (Voir fonction creerUnCoffre)

    // ── 4. ÉTOILES ───────────────────────────────────────────────────────
    const starVerts = [];
    for (let i = 0; i < 800; i++)
        starVerts.push((Math.random()-.5)*30, (Math.random()-.5)*30, (Math.random()-.5)*30);
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.03 }));
    scene.add(stars);

    // Source INVISIBLE pour les god rays — sert uniquement de point d'ancrage
    // en espace écran, ne doit JAMAIS être visible
    const sourceMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0 });
    const sourceMesh = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), sourceMat);
    sourceMesh.position.set(0, 0.05, 0);
    sourceMesh.renderOrder = -1; // Ne pas rendre visible
    scene.add(sourceMesh);

    // ── 5. SOL EN QUADRILLAGE MAGIQUE ───────────────────────────────────
    const gridUniforms = {
        chestPositions: { value: new Array(10).fill(0).map(() => new THREE.Vector3(0, 100, 0)) },
        chestCount: { value: 0 },
        radius: { value: 1.5 },
        gridColor: { value: new THREE.Color(0xC4BAFF) }
    };

    const gridMat = new THREE.ShaderMaterial({
        uniforms: gridUniforms,
        transparent: true,
        vertexShader: `
            varying vec3 vWorldPos;
            void main() {
                vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform vec3 chestPositions[10];
            uniform int chestCount;
            uniform float radius;
            uniform vec3 gridColor;
            varying vec3 vWorldPos;

            void main() {
                if (chestCount == 0) discard;
                float totalAlpha = 0.0;
                for(int i = 0; i < 10; i++) {
                    if (i >= chestCount) break;

                    float distXZ = distance(vWorldPos.xz, chestPositions[i].xz);

                    // Apparition beaucoup plus tardive (seulement à moins de 1.0 unité du sol)
                    float h = clamp(1.0 - (chestPositions[i].y + 0.4) / 1.0, 0.0, 1.0);
                    float heightFactor = pow(h, 3.0);

                    // Le rayon du quadrillage s'élargit aussi au fur et à mesure de la descente
                    float currentRadius = radius * (0.3 + 0.7 * heightFactor);
                    float currentAlpha = (1.0 - smoothstep(currentRadius * 0.5, currentRadius, distXZ)) * heightFactor;

                    totalAlpha = max(totalAlpha, currentAlpha);
                }

                if (totalAlpha <= 0.0) discard;

                // Dessin du quadrillage
                float size = 0.4;
                vec2 grid = abs(fract(vWorldPos.xz / size - 0.5) - 0.5) / (fwidth(vWorldPos.xz) / size);
                float line = min(grid.x, grid.y);
                float mask = 1.0 - min(line, 1.0);

                gl_FragColor = vec4(gridColor, totalAlpha * mask * 0.5);
            }
        `
    });

    const gridFloor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), gridMat);
    gridFloor.rotation.x = -Math.PI / 2;
    gridFloor.position.y = -0.41; // Juste au dessus du "sol" noir
    scene.add(gridFloor);

    // ── 6. SHADER GOD RAYS (flou radial depuis la source) ────────────────
    const GodRaysShader = {
        uniforms: {
            tDiffuse:      { value: null },
            lightPosition: { value: new THREE.Vector2(0.5, 0.5) },
            exposure:      { value: 0.0 },
            decay:         { value: 0.85 },
            density:       { value: 0.80 },
            // Rayons très subtils — le shader amplifie les pixels brillants du mesh
            weight:        { value: 0.005 },
        },
        vertexShader: `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
        `,
        fragmentShader: `
            uniform sampler2D tDiffuse;
            uniform vec2 lightPosition;
            uniform float exposure;
            uniform float decay;
            uniform float density;
            uniform float weight;
            varying vec2 vUv;

            void main() {
                vec2 tc = vUv;
                vec2 delta = (tc - lightPosition) * (1.0 / 80.0) * density;
                float illum = 1.0;
                vec4 rays = vec4(0.0);
                for (int i = 0; i < 80; i++) {
                    tc -= delta;
                    vec4 s = texture2D(tDiffuse, clamp(tc, 0.0, 1.0));
                    s *= illum * weight;
                    rays += s;
                    illum *= decay;
                }
                gl_FragColor = texture2D(tDiffuse, vUv) + rays * exposure;
            }
        `
    };

    // ── 7. POST-PROCESSING ───────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    // Bloom calibré : resolution divisée par 2 sur mobile
    const bloomRes = isMobile ? 0.1 : 1.0;
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth * bloomRes, innerHeight * bloomRes), 0.5, 0,1, 0.2);
    composer.addPass(bloomPass);

    const godRaysPass = new ShaderPass(GodRaysShader);
    godRaysPass.enabled = false; // dormant jusqu'à l'ouverture
    composer.addPass(godRaysPass);

    composer.addPass(new OutputPass());

    // ── 8. CHARGEMENT DU COFFRE ──────────────────────────────────────────
    let mixers = [];
    let coffreData = []; // Stocke { model, mixer, rarity, lights }
    let coffreEstOuvert = false;
    let loterieDemaree = false;
    let dejaRecupere = false;
    let isIdle = true;
    let godRaysIntensity = 0;
    let isMulti = false;
    let pretAOpen = false; // Nouveau verrou
    let coffresPrets = 0;  // Compteur de coffres au sol

    // Lumières d'ambiance globales (toujours nécessaires)
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // --- SYSTÈME DE RARETÉ ---
    let resultatRarite = null;
    const rarities = [
        { id: 'commun',    name: 'COMMUN',      color: 0xbdbdbd, chance: 50, mult: 10 },
        { id: 'rare',      name: 'RARE',        color: 0x66FFFD, chance: 30, mult: 15 },
        { id: 'mythique',  name: 'MYTHIQUE',    color: 0xE27AFF, chance: 12, mult: 25 },
        { id: 'legendaire', name: 'LÉGENDAIRE',  color: 0xFFB32E, chance: 6, mult: 35 },
        { id: 'secret',    name: 'SECRET',      color: 0xff3e29, chance: 1.5,  mult: 40 },
        { id: 'lunair',    name: 'LUNAIR',      color: 0x4A52FF, chance: 0.5,  mult: 50 }
    ];

    function tirerRarite(pool = rarities) {
        const totalWeight = pool.reduce((sum, r) => sum + r.chance, 0);
        const rand = Math.random() * totalWeight;
        let cumul = 0;
        for (const r of pool) {
            cumul += r.chance;
            if (rand <= cumul) return r;
        }
        return pool[0];
    }

    const godRarities = [
        { id: 'legendaire', name: 'LÉGENDAIRE',  color: 0xFFB32E, chance: 75, mult: 35 },
        { id: 'secret',    name: 'SECRET',      color: 0xff3e29, chance: 15,  mult: 40 },
        { id: 'lunair',    name: 'LUNAIR',      color: 0x4A52FF, chance: 10,  mult: 50 }
    ];

    // --- RÉGLAGES DES CHANCES ---
    const GOD_PACK_CHANCE = 0.01; // 0.001 = 0.1% | 0.01 = 1% | 0.5 = 50%
    const MULTI_CHEST_COUNT = 10; // Nombre de coffres pour le bouton x10


    const loader = new GLTFLoader();
    let originalGltf = null;

    loader.load('models/lunar_chest.gltf', (gltf) => {
        originalGltf = gltf;
        // On ne crée pas le coffre tout de suite, on attend le clic pour savoir combien
    }, undefined, (err) => console.error(err));

    function creerUnCoffre(pos, gltf) {
        const model = SkeletonUtils.clone(gltf.scene);
        model.position.copy(pos);
        model.rotation.y = 0;
        scene.add(model);

        // Lumières individuelles : On ne met pas de SpotLight sur mobile (trop lourd)
        let spot = null;
        if (!isMobile) {
            spot = new THREE.SpotLight(0xffffff, 0, 10, Math.PI / 10, 0.8, 2);
            spot.position.set(0, 0.2, 0);
            spot.target.position.set(0, 2, 0);
            model.add(spot);
            model.add(spot.target);
        }

        const pCenter = new THREE.PointLight(0xffffff, 0, 1.5);
        pCenter.position.set(0, 0.2, 0);
        model.add(pCenter);

        const mixer = new THREE.AnimationMixer(model);
        const clipFalling = THREE.AnimationClip.findByName(gltf.animations, 'Falling');
        const clipWait    = THREE.AnimationClip.findByName(gltf.animations, 'Wait');
        const clipOpen    = THREE.AnimationClip.findByName(gltf.animations, 'Open');

        const aFalling = mixer.clipAction(clipFalling);
        const aWait = mixer.clipAction(clipWait);
        const aOpen = mixer.clipAction(clipOpen);

        aFalling.setLoop(THREE.LoopOnce); aFalling.clampWhenFinished = true;
        aWait.setLoop(THREE.LoopRepeat);
        aOpen.setLoop(THREE.LoopOnce);    aOpen.clampWhenFinished = true;

        // Moon Glow discret par coffre
        const moonLight = new THREE.PointLight(0xffffd8, 0.15, 1.0);
        moonLight.position.set(0, 0.1, 0.6);
        model.add(moonLight);

        // Glow lune (matériel)
        const luneColor = new THREE.Color(0xffffd8);
        model.traverse((child) => {
            if (child.isMesh && child.material) {
                const materials = Array.isArray(child.material) ? child.material : [child.material];
                materials.forEach(mat => {
                    if (!mat.emissive) mat.emissive = new THREE.Color(0, 0, 0);
                    let isMoon = false;
                    if (mat.color && mat.color.isColor) {
                        const r = mat.color.r - luneColor.r, g = mat.color.g - luneColor.g, b = mat.color.b - luneColor.b;
                        if (Math.sqrt(r*r+g*g+b*b) < 0.2) isMoon = true;
                    }
                    if ((child.name + ' ' + mat.name).toLowerCase().match(/moon|lune|luna|symbol/)) isMoon = true;
                    if (isMoon) { mat.emissive.setHex(0xffffd8); mat.emissiveIntensity = 1.5; }
                });
            }
        });

        mixer.addEventListener('finished', (e) => {
            if (e.action === aFalling) {
                aWait.play();
                coffresPrets++;

                // Si God Pack, on ajoute les particules ambiantes au sol
                if (window.currentIsGodPack) {
                    godPackAmbient.push(new GodPackAmbientParticles(scene, model.position));
                }

                // Si tous les coffres sont au sol, on déverrouille le clic
                if (coffresPrets === (isMulti ? MULTI_CHEST_COUNT : 1)) {
                    pretAOpen = true;
                }
            }
            if (e.action === aOpen) {
                if (soundLoop.buffer && !soundLoop.isPlaying) soundLoop.play();
                document.getElementById('recuperer-button').style.display = 'block';
            }
        });

        return { model, mixer, aFalling, aWait, aOpen, lights: { spot, pCenter, moonLight }, rarity: null };
    }

    const startBtn = document.getElementById('start-button');
    const startBtnX10 = document.getElementById('start-button-x10');
    const menu = document.getElementById('selection-menu');

    function demarrerLoterie(modeX10) {
        if (!originalGltf) return;
        isIdle = false;
        isMulti = modeX10;
        pretAOpen = false;
        coffresPrets = 0;
        controls.enabled = false;

        const isPortrait = window.innerHeight > window.innerWidth;

        // Caméra adaptative selon l'orientation
        let targetZ, targetY;
        if (isMulti) {
            targetZ = isPortrait ? 8.0 : 4.0;
            targetY = isPortrait ? 5.0 : 2.8;
        } else {
            targetZ = isPortrait ? 3.5 : 2.2;
            targetY = isPortrait ? 0.8 : 0.4;
        }

        new TWEEN.Tween(camera.position)
            .to({ x: 0, y: targetY, z: targetZ }, 2500)
            .easing(TWEEN.Easing.Quadratic.InOut)
            .onUpdate(() => camera.lookAt(0, -0.4, 0))
            .onComplete(() => { controls.enabled = true; controls.update(); })
            .start();

        const count = isMulti ? MULTI_CHEST_COUNT : 1;

        // Tirage du God Pack selon la constante GOD_PACK_CHANCE
        const isGodPack = isMulti && (Math.random() < GOD_PACK_CHANCE);
        window.currentIsGodPack = isGodPack; // Stockage global pour creerUnCoffre

        // Effet sur les étoiles et le sol
        if (isGodPack) {
            stars.material.color.setHex(0xFFD700);
            gridUniforms.gridColor.value.setHex(0xFFD700);

            // Son épique pour l'annonce du God Pack
            const buffer = rarityBuffers['lunair'];
            if (buffer) {
                const s = new THREE.Audio(listener);
                s.setBuffer(buffer);
                s.setVolume(0.6);
                s.play();
            }
        } else {
            stars.material.color.setHex(0xFFFFFF);
            gridUniforms.gridColor.value.setHex(0xC4BAFF);
        }

        // 1. Pré-tirage et Tri des raretés AVANT la chute
        const preRolledRarities = [];
        for (let i = 0; i < count; i++) {
            preRolledRarities.push(tirerRarite(isGodPack ? godRarities : rarities));
        }
        preRolledRarities.sort((a, b) => {
            const idxA = rarities.findIndex(r => r.id === a.id);
            const idxB = rarities.findIndex(r => r.id === b.id);
            return idxA - idxB;
        });

        for (let i = 0; i < count; i++) {
            setTimeout(() => {
                let x = 0, z = 0;
                if (isMulti) {
                    if (isPortrait) {
                        x = (i % 2 - 0.5) * 1.4;
                        z = (Math.floor(i / 2) - 2) * 1.4;
                    } else {
                        x = (i % 5 - 2) * 1.5;
                        z = (Math.floor(i / 5) - 0.5) * 1.5;
                    }
                }
                const c = creerUnCoffre(new THREE.Vector3(x, -0.4, z), originalGltf);
                c.rarity = preRolledRarities[i]; // Attribution de la rareté triée

                // Effet Aura Dorée pour le God Pack
                if (isGodPack) {
                    c.lights.moonLight.color.setHex(0xFFD700);
                    c.lights.moonLight.intensity = 0.8;
                    c.lights.moonLight.distance = 2.5;
                }

                coffreData.push(c);
                mixers.push(c.mixer);
                c.aFalling.play();
                if (soundFall.buffer) {
                    const s = new THREE.Audio(listener);
                    s.setBuffer(soundFall.buffer);
                    s.setVolume(0.3); // Divisé par 2 en x10
                    s.play();
                }
            }, i * 200); // Effet de rafale
        }

        loterieDemaree = true;
        menu.classList.add('fade-out');
    }

    startBtn.addEventListener('click', () => demarrerLoterie(false));
    startBtnX10.addEventListener('click', () => demarrerLoterie(true));

    const recupererBtn = document.getElementById('recuperer-button');
    recupererBtn.addEventListener('click', () => {
        recupererBtn.style.display = 'none';
        coffreEstOuvert = false;
        dejaRecupere = true;
        godRaysIntensity = 0;
        godRaysPass.enabled = false;

        activeSparkles.forEach(s => s.stop());

        if (soundTake.buffer) soundTake.play();

        coffreData.forEach(c => {
            if (c.lights.spot) c.lights.spot.intensity = 0;
            if (c.lights.pCenter) c.lights.pCenter.intensity = 0;
        });

        godPackAmbient.forEach(p => p.destroy());
        godPackAmbient = [];

        if (soundLoop.isPlaying) soundLoop.stop();
    });

    // ── 9. BOUCLE D'ANIMATION ────────────────────────────────────────────
    const clock = new THREE.Clock();
    const lightWorldPos = new THREE.Vector3();

    function animate() {
        requestAnimationFrame(animate);
        TWEEN.update();

        const delta = clock.getDelta();
        mixers.forEach(m => m.update(delta));
        activeSparkles.forEach(s => s.update(delta));
        activeSparkles = activeSparkles.filter(s => !s.isDead);

        // Mise à jour du sol en quadrillage
        gridUniforms.chestCount.value = coffreData.length;
        const tempVec = new THREE.Vector3();
        coffreData.forEach((c, i) => {
            if (i < 10) {
                gridUniforms.chestPositions.value[i].x = c.model.position.x;
                gridUniforms.chestPositions.value[i].z = c.model.position.z;

                // On récupère la hauteur réelle du mesh (animé par GLTF)
                let actualY = c.model.position.y;
                c.model.traverse(child => {
                    if (child.isMesh && !child.name.toLowerCase().includes('spot')) {
                        child.getWorldPosition(tempVec);
                        actualY = tempVec.y;
                    }
                });
                gridUniforms.chestPositions.value[i].y = actualY;
            }
        });

        if (isIdle) {
            const t = clock.getElapsedTime() * 0.1;
            camera.position.x = Math.sin(t) * 3.5;
            camera.position.z = Math.cos(t) * 3.5;
            camera.position.y = 1 + Math.sin(t * 0.5) * 0.5;
            camera.lookAt(0, -0.4, 0);
        } else {
            controls.update();
        }

        stars.rotation.y += 0.0003;
        stars.rotation.x += 0.0001;

        const t = clock.getElapsedTime();
        godPackAmbient.forEach(p => p.update(t));

        // Intensité fixe des lunes
        coffreData.forEach(c => {
            c.lights.moonLight.intensity = 0.2;
        });

        if (coffreEstOuvert) {
            const intensityScale = 0.2;

            // On allume les lumières internes des coffres (uniquement ceux qui s'ouvrent)
            coffreData.forEach(c => {
                if (!c.isOpening) return;
                const m = c.rarity.mult;
                const col = c.rarity.color;

                c.lights.pCenter.color.setHex(col);
                if (c.lights.spot) c.lights.spot.color.setHex(col);

                // Intensité stable (sans pulsation)
                const pulse = 1;

                if (c.lights.spot) {
                    if (c.lights.spot.intensity < 6 * m * intensityScale)
                        c.lights.spot.intensity += 0.12 * m * intensityScale;
                    c.lights.spot.intensity *= pulse;
                }

                if (c.lights.pCenter.intensity < 2.5 * m * intensityScale)
                    c.lights.pCenter.intensity += 0.06 * m * intensityScale;
                c.lights.pCenter.intensity *= pulse;
            });

            // God rays : désactivés sur mobile pour la performance
            if (!isMobile) {
                const maxExposure = 0.9;
                if (!godRaysPass.enabled) godRaysPass.enabled = true;
                if (godRaysIntensity < maxExposure) godRaysIntensity = Math.min(maxExposure, godRaysIntensity + 0.004);
                godRaysPass.uniforms.exposure.value = godRaysIntensity;

                lightWorldPos.set(0, 0.05, 0).project(camera);
                if (lightWorldPos.z < 1) {
                    godRaysPass.uniforms.lightPosition.value.set(
                        (lightWorldPos.x + 1) / 2,
                        (lightWorldPos.y + 1) / 2
                    );
                } else {
                    godRaysPass.uniforms.exposure.value = 0;
                }
            } else {
                godRaysPass.enabled = false;
            }
        }

        composer.render();
    }
    animate();

    // ── 10. CLIC SUR LE COFFRE ───────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('click', (e) => {
        // On vérifie le verrou pretAOpen
        if (coffreData.length === 0 || !loterieDemaree || !pretAOpen || coffreEstOuvert || dejaRecupere) return;
        mouse.x = (e.clientX / innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const intersects = raycaster.intersectObjects(coffreData.map(c => c.model), true);
        if (intersects.length > 0) {
            coffreEstOuvert = true;

            // On utilise l'ordre naturel des coffres car ils ont été triés à la création
            let cumulativeDelay = 0;
            coffreData.forEach((c, i) => {
                const startOpeningAt = cumulativeDelay;

                setTimeout(() => {
                    c.isOpening = true;
                    c.aWait.stop();
                    c.aOpen.play();

                    // Jouer le son d'ouverture pour chaque coffre
                    if (soundOpen.buffer) {
                        const s = new THREE.Audio(listener);
                        s.setBuffer(soundOpen.buffer);
                        s.setVolume(isMulti ? 0.05 : 0.1);
                        s.play();
                    }

                    // Explosion instantanée si légendaire ou plus
                    if (['legendaire', 'secret', 'lunair'].includes(c.rarity.id)) {
                        activeSparkles.push(new MagicBurst(scene, c.model.position, c.rarity));
                    }

                    // Déclenchement du scintillement magique
                    setTimeout(() => {
                        activeSparkles.push(new MagicSparkles(scene, c.model.position, c.rarity));
                    }, 550 + (c.rarity.mult * 30));

                    // Son de rareté spécifique
                    setTimeout(() => {
                        const buffer = rarityBuffers[c.rarity.id];
                        if (buffer) {
                            const rs = new THREE.Audio(listener);
                            rs.setBuffer(buffer);
                            rs.setVolume(isMulti ? 0.10 : 0.15);
                            rs.play();
                        }
                    }, 0);
                }, startOpeningAt);

                // Calcul du délai pour le PROCHAIN coffre
                cumulativeDelay += (c.rarity.mult * 20);
            });
        }
    });

    // ── 11. REDIMENSIONNEMENT ────────────────────────────────────────────
    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        composer.setSize(innerWidth, innerHeight);
    });
</script>
</body>
